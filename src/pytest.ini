[pytest]
DJANGO_SETTINGS_MODULE = main.settings
python_files = tests.py test_*.py *_tests.py

[coverage:run]
omit =
    */tests/*
    */migrations/*
    */__init__.py
    */asgi.py
    */wsgi.py
    */urls.py
    manage.py

[coverage:report]
omit =
    */tests/*
    */migrations/*
    */__init__.py
    */asgi.py
    */wsgi.py
    */urls.py
    manage.py
